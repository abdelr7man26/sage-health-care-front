<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#0f5238"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square brand tile (system green) -->
  <rect width="64" height="64" rx="16" fill="url(#sageBg)"/>

  <!-- "S" monogram for SAGE -->
  <text x="22" y="45" text-anchor="middle"
        font-family="Poppins, 'Segoe UI', Arial, sans-serif"
        font-size="40" font-weight="800" fill="#ffffff">S</text>

  <!-- Medical cross — signals "Healthcare" -->
  <g fill="#a8e7c5">
    <rect x="40" y="22" width="6" height="20" rx="3"/>
    <rect x="33" y="29" width="20" height="6" rx="3"/>
  </g>
</svg>
